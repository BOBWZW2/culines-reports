<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agreement POL-POD 货量查询</title>
<style>
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --bg3: #334155;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.12);
  --orange: #f59e0b;
  --purple: #a78bfa;
  --red: #ef4444;
  --border: #334155;
  --radius: 10px;
}
.light {
  --bg: #f8fafc;
  --bg2: #ffffff;
  --bg3: #e2e8f0;
  --text: #1e293b;
  --text2: #475569;
  --text3: #94a3b8;
  --accent: #2563eb;
  --accent2: #3b82f6;
  --border: #cbd5e1;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; transition: background 0.3s, color 0.3s;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 1.5rem; font-weight: 700;
  background: linear-gradient(135deg, var(--accent2), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-actions { display: flex; gap: 8px; align-items: center; }
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px; font-size: 0.75rem;
  background: var(--bg3); color: var(--text2);
}
.badge-live { background: var(--green-bg); color: var(--green); }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Search */
.search-box { position: relative; margin-bottom: 20px; }
.search-box input {
  width: 100%; padding: 14px 20px 14px 48px;
  background: var(--bg2); border: 2px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-size: 1rem; outline: none; transition: border 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 1.2rem;
}

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.chip {
  padding: 6px 14px; border-radius: 20px; font-size: 0.8rem;
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }

/* Stats bar */
.stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card {
  flex: 1; min-width: 140px; padding: 16px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); text-align: center;
}
.stat-value { font-size: 1.6rem; font-weight: 800; color: var(--accent2); }
.stat-label { font-size: 0.75rem; color: var(--text3); margin-top: 4px; }

/* Info card */
.info-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
}
.info-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}
.info-item label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.info-item span { font-size: 0.95rem; font-weight: 600; display: block; margin-top: 2px; }

/* Table */
.table-container {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 20px;
}
.table-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
}
.table-header h3 { font-size: 0.95rem; font-weight: 600; }
.btn {
  padding: 6px 14px; border-radius: 6px; font-size: 0.8rem;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); cursor: pointer; transition: all 0.2s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }

/* Column header */
.col-header {
  display: grid;
  grid-template-columns: 90px 1fr 2fr 70px 70px 80px;
  padding: 10px 20px; font-size: 0.7rem; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border); font-weight: 600;
}
.col-header span:nth-child(n+4) { text-align: right; }

/* Data rows */
.data-row {
  display: grid;
  grid-template-columns: 90px 1fr 2fr 70px 70px 80px;
  align-items: center; padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem; color: var(--text2);
  transition: background 0.15s;
  position: relative;
}
.data-row:hover { background: var(--bg3); }
.data-row .vvd {
  font-size: 0.75rem; color: var(--accent2); font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.data-row .pol { font-weight: 600; color: var(--text); }
.data-row .pod { color: var(--text2); }
.data-row .val { text-align: right; font-size: 0.85rem; }
.data-row .val.teu { color: var(--accent2); font-weight: 700; }

/* Row bar bg */
.row-bar-bg {
  position: absolute; left: 0; top: 0; bottom: 0;
  opacity: 0.05; background: var(--accent);
  border-radius: 0 4px 4px 0; transition: width 0.4s;
}

/* Grand total */
.grand-total {
  display: grid;
  grid-template-columns: 90px 1fr 2fr 70px 70px 80px;
  align-items: center; padding: 14px 20px;
  background: var(--accent); color: white;
  font-weight: 800; font-size: 0.95rem;
}
.grand-total .label-cell { display: flex; align-items: center; gap: 8px; }
.grand-total span:nth-child(n+4) { text-align: right; }

/* Not found */
.not-found { text-align: center; padding: 60px 20px; color: var(--text3); }
.not-found .icon { font-size: 3rem; margin-bottom: 12px; }
.not-found p { font-size: 1rem; }

/* Recent / top section */
.recent { margin-bottom: 20px; }
.recent-label { font-size: 0.7rem; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Theme toggle */
.theme-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--accent); }

/* Footer */
.footer {
  text-align: center; padding: 24px 0; color: var(--text3);
  font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 20px;
}

/* Responsive */
@media (max-width: 900px) {
  .data-row, .col-header, .grand-total {
    grid-template-columns: 70px 0.8fr 1.5fr 60px 60px;
  }
  .col-header span:nth-child(6),
  .data-row .val:nth-child(6),
  .grand-total span:nth-child(6) { display: none; }
}
@media (max-width: 600px) {
  .data-row, .col-header, .grand-total {
    grid-template-columns: 60px 0.8fr 1.2fr 60px;
  }
  .col-header span:nth-child(5), .data-row .val:nth-child(5),
  .grand-total span:nth-child(5) { display: none; }
  .info-grid { grid-template-columns: 1fr 1fr; }
  .container { padding: 12px; }
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease-out; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
</style>
</head>

<script>
(function() {
  const data = typeof EMBED_DATA !== 'undefined' ? EMBED_DATA : {};
  const agreements = data.agreements || {};
  const topAgreements = data.topAgreements || [];

  const searchInput = document.getElementById('searchInput');
  const resultArea = document.getElementById('resultArea');
  const recentSection = document.getElementById('recentSection');
  const recentChips = document.getElementById('recentChips');
  const topSection = document.getElementById('topSection');
  const topChips = document.getElementById('topChips');

  document.getElementById('dataInfo').textContent =
    (data.totalCount || '?') + ' 个 Agreement · ' + (data.generatedAt || '');
  document.getElementById('footer').textContent =
    'Daily Booking Agreement Query · \u6570\u636E\u6765\u81EA FineBI · ' + (data.generatedAt || '');

  // --- Theme ---
  var savedTheme = localStorage.getItem('agr_theme') || 'dark';
  if (savedTheme === 'light') document.body.classList.add('light');
  window.toggleTheme = function() {
    document.body.classList.toggle('light');
    var isLight = document.body.classList.contains('light');
    localStorage.setItem('agr_theme', isLight ? 'light' : 'dark');
    document.querySelector('.theme-btn').textContent = isLight ? '\u2600\uFE0F' : '\uD83C\uDF19';
  };
  if (savedTheme === 'light') document.querySelector('.theme-btn').textContent = '\u2600\uFE0F';

  // --- Recent ---
  function getRecent() { try { return JSON.parse(localStorage.getItem('agr_recent') || '[]'); } catch(e) { return []; } }
  function addRecent(agr) {
    var list = getRecent().filter(function(a){ return a !== agr; });
    list.unshift(agr);
    list = list.slice(0, 8);
    localStorage.setItem('agr_recent', JSON.stringify(list));
    renderRecent();
  }
  function renderRecent() {
    var list = getRecent();
    if (list.length === 0) { recentSection.style.display = 'none'; return; }
    recentSection.style.display = 'block';
    recentChips.innerHTML = list.map(function(a) {
      return '<span class="chip" data-agr="' + a + '">' + a + '</span>';
    }).join('');
  }
  renderRecent();

  // Chip click delegation
  recentChips.addEventListener('click', function(e) {
    var chip = e.target.closest('.chip');
    if (chip) doSearch(chip.getAttribute('data-agr'));
  });
  topChips.addEventListener('click', function(e) {
    var chip = e.target.closest('.chip');
    if (chip) doSearch(chip.getAttribute('data-agr'));
  });

  // --- Top agreements ---
  if (topAgreements.length > 0) {
    topSection.style.display = 'block';
    topChips.innerHTML = topAgreements.map(function(a) {
      return '<span class="chip" data-agr="' + a.agr + '" title="' + a.teu.toLocaleString() + ' TEU / ' + a.blCount + ' BL">'
        + a.agr + ' <small style="color:var(--text3)">' + a.teu.toLocaleString() + 'T</small></span>';
    }).join('');
  }

  // --- Search ---
  function normalize(s) { return s.toUpperCase().trim(); }

  function findAgreement(query) {
    var q = normalize(query);
    if (agreements[q]) return { key: q, data: agreements[q] };
    for (var k in agreements) {
      if (k.indexOf(q) !== -1 || q.indexOf(k) !== -1) return { key: k, data: agreements[k] };
    }
    return null;
  }

  function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderResult(agrKey, d) {
    var rows = d.rows || [];
    var maxTeu = 1;
    for (var i = 0; i < rows.length; i++) { if (rows[i].teu > maxTeu) maxTeu = rows[i].teu; }

    // Info card
    var html = '<div class="info-card fade-in">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
      + '<h2 style="font-size:1.2rem;font-weight:800">' + escapeHtml(agrKey) + '</h2>'
      + '<span class="badge">' + escapeHtml(d.contractType || '-') + '</span>'
      + '</div>'
      + '<div class="info-grid">'
      + '<div class="info-item"><label>Shipper</label><span title="' + escapeHtml(d.shipper) + '">' + escapeHtml(d.shipper || '-') + '</span></div>'
      + '<div class="info-item"><label>Sales P.I.C</label><span>' + escapeHtml(d.salesPIC || '-') + '</span></div>'
      + '<div class="info-item"><label>Forwarder</label><span title="' + escapeHtml(d.forwarder) + '">' + escapeHtml(d.forwarder || '-') + '</span></div>'
      + '<div class="info-item"><label>BL / VVD</label><span>' + (d.blCount || 0).toLocaleString() + ' / ' + (d.vvdCount || 0).toLocaleString() + '</span></div>'
      + '</div></div>';

    // Stats
    html += '<div class="stats-bar fade-in">'
      + '<div class="stat-card"><div class="stat-value" style="color:var(--green)">' + (d.totalTEU || 0).toLocaleString() + '</div><div class="stat-label">总 TEU</div></div>'
      + '<div class="stat-card"><div class="stat-value" style="color:var(--orange)">' + (d.total20ft || 0).toLocaleString() + '</div><div class="stat-label">20ft</div></div>'
      + '<div class="stat-card"><div class="stat-value" style="color:var(--purple)">' + (d.total40ft || 0).toLocaleString() + '</div><div class="stat-label">40ft</div></div>'
      + '</div>';

    // Table
    html += '<div class="table-container fade-in">'
      + '<div class="table-header"><h3>\uD83D\uDCCC POL \u2192 POD \u8D27\u91CF\u660E\u7EC6\uFF08' + rows.length + ' \u6761\uFF09</h3>'
      + '<button class="btn" id="exportBtn">\uD83D\uDCE5 \u5BFC\u51FA CSV</button></div>'
      + '<div class="col-header"><span>VVD</span><span>POL</span><span>POD</span><span>20ft</span><span>40ft</span><span>TEU</span></div>';

    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var barW = (r.teu / maxTeu * 100).toFixed(1);
      html += '<div class="data-row">'
        + '<div class="row-bar-bg" style="width:' + barW + '%"></div>'
        + '<div class="vvd" title="' + escapeHtml(r.vvd || '') + '">' + escapeHtml(r.vvd || '-') + '</div>'
        + '<div class="pol">' + escapeHtml(r.pol) + '</div>'
        + '<div class="pod">' + escapeHtml(r.pod) + '</div>'
        + '<div class="val">' + r.ft20.toLocaleString() + '</div>'
        + '<div class="val">' + r.ft40.toLocaleString() + '</div>'
        + '<div class="val teu">' + r.teu.toLocaleString() + '</div></div>';
    }

    html += '<div class="grand-total">'
      + '<span></span>'
      + '<span class="label-cell">合计</span><span>' + rows.length + ' 条</span>'
      + '<span>' + (d.total20ft || 0).toLocaleString() + '</span>'
      + '<span>' + (d.total40ft || 0).toLocaleString() + '</span>'
      + '<span>' + (d.totalTEU || 0).toLocaleString() + '</span></div></div>';

    resultArea.innerHTML = html;

    // Bind export button
    document.getElementById('exportBtn').addEventListener('click', function() {
      exportCSV(agrKey, d);
    });
  }

  function doSearch(query) {
    searchInput.value = query;
    var result = findAgreement(query);
    if (result) {
      addRecent(result.key);
      renderResult(result.key, result.data);
    } else {
      resultArea.innerHTML = '<div class="not-found fade-in"><div class="icon">\uD83D\uDD0D</div>'
        + '<p>\u672A\u627E\u5230 Agreement "' + escapeHtml(query) + '"</p>'
        + '<p style="font-size:0.8rem;margin-top:8px;color:var(--text3)">\u8BF7\u68C0\u67E5\u7F16\u53F7\u662F\u5426\u6B63\u786E\uFF0C\u652F\u6301\u6A21\u7CCA\u5339\u914D</p></div>';
    }
  }
  window.doSearch = doSearch;

  searchInput.addEventListener('input', debounce(function() {
    var q = searchInput.value.trim();
    if (!q) { resultArea.innerHTML = ''; return; }
    doSearch(q);
  }, 300));

  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var q = searchInput.value.trim();
      if (q) doSearch(q);
    }
  });

  // --- CSV Export ---
  function exportCSV(agrKey, d) {
    var rows = d.rows || [];
    var csv = '\uFEFFVVD,POL,POD,20ft,40ft,TEU\n';
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      csv += '"' + (r.vvd || '') + '",' + r.pol + ',' + r.pod + ',' + r.ft20 + ',' + r.ft40 + ',' + r.teu + '\n';
    }
    csv += '-,\u5408\u8BA1,-,' + (d.total20ft || 0) + ',' + (d.total40ft || 0) + ',' + (d.totalTEU || 0) + '\n';
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'agreement_' + agrKey + '_pol_pod.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  // --- Utilities ---
  function debounce(fn, ms) {
    var t; return function() { var a = arguments; var self = this; clearTimeout(t); t = setTimeout(function(){ fn.apply(self, a); }, ms); };
  }
})();
</script>
