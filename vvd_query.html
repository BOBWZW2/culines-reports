<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VVD Booking Query</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#162032;--bg4:#0c1322;
  --bd:#334155;--bd2:#1e293b;
  --tx:#e2e8f0;--tx2:#f1f5f9;--tx3:#cbd5e1;--tx4:#94a3b8;--tx5:#64748b;--tx6:#475569;
  --ac:#3b82f6;--ac2:#2563eb;
  --hb:linear-gradient(135deg,#1e293b,#0f172a);
  --hv:rgba(59,130,246,.08);
  --sb:#334155;
  --tag-ln:rgba(59,130,246,.15);--tag-ln-t:#93c5fd;
  --tag-pl:rgba(34,197,94,.15);--tag-pl-t:#86efac;
  --tag-pd:rgba(249,115,22,.15);--tag-pd-t:#fed7aa;
  --tag-cg:rgba(234,179,8,.15);--tag-cg-t:#fde047;
  --tag-dt:rgba(34,197,94,.15);--tag-dt-t:#86efac;
  --tag-ts:rgba(168,85,247,.15);--tag-ts-t:#d8b4fe;
  --vbadge:rgba(168,85,247,.15);--vbadge-t:#d8b4fe;
  --exp-btn:rgba(34,197,94,.1);--exp-btn-b:rgba(34,197,94,.3);--exp-btn-t:#86efac;
  --bar-bg:rgba(249,115,22,.25);--bar-fill:linear-gradient(90deg,#f97316,#fb923c);--bar-t:#fed7aa;
  --exp-bg:rgba(59,130,246,.06);
}
:root.light{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--bg4:#e2e8f0;
  --bd:#cbd5e1;--bd2:#e2e8f0;
  --tx:#1e293b;--tx2:#0f172a;--tx3:#334155;--tx4:#64748b;--tx5:#94a3b8;--tx6:#94a3b8;
  --ac:#2563eb;--ac2:#1d4ed8;
  --hb:linear-gradient(135deg,#eff6ff,#f8fafc);
  --hv:rgba(59,130,246,.06);
  --sb:#cbd5e1;
  --tag-ln:rgba(59,130,246,.1);--tag-ln-t:#2563eb;
  --tag-pl:rgba(22,163,74,.1);--tag-pl-t:#16a34a;
  --tag-pd:rgba(234,88,12,.1);--tag-pd-t:#ea580c;
  --tag-cg:rgba(202,138,4,.1);--tag-cg-t:#ca8a04;
  --tag-dt:rgba(22,163,74,.1);--tag-dt-t:#16a34a;
  --tag-ts:rgba(147,51,234,.1);--tag-ts-t:#9333ea;
  --vbadge:rgba(147,51,234,.1);--vbadge-t:#9333ea;
  --exp-btn:rgba(22,163,74,.08);--exp-btn-b:rgba(22,163,74,.25);--exp-btn-t:#16a34a;
  --bar-bg:rgba(234,88,12,.15);--bar-fill:linear-gradient(90deg,#ea580c,#f97316);--bar-t:#ea580c;
  --exp-bg:rgba(59,130,246,.04);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s}
.header{background:var(--hb);border-bottom:1px solid var(--bd);padding:20px 28px;transition:background .3s,border .3s}
.header h1{font-size:22px;font-weight:700;display:flex;align-items:center;gap:10px;color:var(--tx2)}
.header .logo{font-size:26px}
.header .subtitle{font-size:13px;color:var(--tx5);margin-top:3px}
.theme-btn{position:fixed;top:20px;right:24px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:16px;z-index:999;transition:background .3s,border .3s;line-height:1}
.theme-btn:hover{border-color:var(--ac)}

.qsec{padding:24px 28px}
.qcard{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:16px;transition:background .3s,border .3s}
.qrow{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:var(--tx5);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.field input{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:11px 14px;color:var(--tx2);font-size:14px;width:260px;transition:background .3s,border .3s,color .3s}
.field input:focus{outline:none;border-color:var(--ac)}
.field input.lane-input{width:180px}
.field .hint{font-size:12px;color:var(--tx6)}

.dd-wrap{position:relative}
.dd-list{display:none;position:absolute;top:100%;left:0;right:0;max-height:280px;overflow-y:auto;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;margin-top:4px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.dd-list.show{display:block}
.dd-item{padding:8px 14px;cursor:pointer;font-size:13px;color:var(--tx4);border-bottom:1px solid var(--bd2);transition:background .15s,color .15s}
.dd-item:hover{background:var(--bg);color:var(--tx2)}
.dd-item:last-child{border-bottom:none}

.btn-q{padding:11px 24px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-q:hover{background:var(--ac2)}
.btn-c{padding:11px 18px;background:transparent;color:var(--tx5);border:1px solid var(--bd);border-radius:8px;font-size:14px;cursor:pointer;transition:color .15s,border .15s}
.btn-c:hover{color:var(--tx2);border-color:var(--tx4)}

.quick{margin-top:14px;padding-top:14px;border-top:1px solid var(--bd)}
.quick-lbl{font-size:12px;color:var(--tx5);margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 11px;background:var(--bg);border:1px solid var(--bd);border-radius:16px;font-size:13px;color:var(--tx4);cursor:pointer;transition:border .15s,color .15s,background .3s}
.chip:hover{border-color:var(--ac);color:var(--tx2)}

.rsec{padding:0 28px 28px}

.scard{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:16px;transition:background .3s,border .3s}
.shdr{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.shdr h2{font-size:16px;color:var(--tx2)}
.vbadge{padding:5px 12px;background:var(--vbadge);color:var(--vbadge-t);border-radius:16px;font-size:14px;font-weight:600}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
.stat{background:var(--bg);padding:12px;border-radius:8px;transition:background .3s}
.stat .lbl{font-size:12px;color:var(--tx5);text-transform:uppercase;margin-bottom:3px}
.stat .val{font-size:20px;font-weight:700;color:var(--tx2)}

.tcard{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;transition:background .3s,border .3s}
.thdr{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.thdr h3{font-size:14px;color:var(--tx4)}
.btn-exp{padding:7px 14px;background:var(--exp-btn);color:var(--exp-btn-t);border:1px solid var(--exp-btn-b);border-radius:6px;font-size:13px;cursor:pointer;transition:background .15s}
.btn-exp:hover{filter:brightness(1.2)}

.twrap{overflow-x:auto;max-height:650px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
thead{background:var(--bg);position:sticky;top:0;z-index:10;transition:background .3s}
th{padding:10px 12px;text-align:left;font-weight:600;color:var(--tx5);border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--bd2);color:var(--tx3)}

.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:13px;font-weight:600}
.tag-ln{background:var(--tag-ln);color:var(--tag-ln-t)}
.tag-pl{background:var(--tag-pl);color:var(--tag-pl-t)}
.tag-pd{background:var(--tag-pd);color:var(--tag-pd-t)}
.tag-cg{background:var(--tag-cg);color:var(--tag-cg-t)}
.tag-dt{background:var(--tag-dt);color:var(--tag-dt-t)}
.tag-ts{background:var(--tag-ts);color:var(--tag-ts-t)}

.pr{cursor:pointer;transition:background .15s}
.pr:hover td{background:var(--hv)}
.pr.exp td{background:var(--exp-bg);border-bottom:none}

.pbd{display:none}
.pbd.show{display:table-row}
.pbd td{background:var(--bg4)!important;padding-left:36px;color:var(--tx4)}

.pbc{display:inline-flex;align-items:center;gap:6px;min-width:110px}
.pb{height:16px;border-radius:3px;background:var(--bar-bg)}
.pbfill{height:100%;border-radius:3px;background:var(--bar-fill)}
.pbt{font-size:13px;color:var(--bar-t);white-space:nowrap;min-width:40px;text-align:right}

.ei{display:inline-block;transition:transform .2s;font-size:12px;color:var(--tx5);margin-right:5px;width:12px}
.exp>.ei{transform:rotate(90deg)}

.tr{font-weight:700;background:var(--bg3)!important}
.tr td{border-top:2px solid var(--bd);color:var(--tx2)}
.gs td{border-top:1px dashed var(--bd)}

.es{text-align:center;padding:50px;color:var(--tx5)}
.es .ic{font-size:42px;margin-bottom:12px}

::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sb);border-radius:4px}
</style>
</head>

<body>
<button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">🌙</button>
<div class="header">
<h1><span class="logo">🚢</span> VVD Booking Query</h1>
<div class="subtitle">输入航次代码查询 | 数据已内嵌聚合 · 无需服务器 · 即时响应 | 上次刷新 <span id="lr" style="color:var(--tx4);font-weight:600;">--</span> | 下次刷新 <span id="nr" style="color:var(--ac);font-weight:600;">--:--</span></div>
</div>

<div class="qsec">
<div class="qcard">
<div class="qrow">
<div class="field"><label>Lane (航线)</label><div class="dd-wrap"><input type="text" id="li" class="lane-input" placeholder="例: REX, AM1" maxlength="10"><div class="dd-list" id="ld"></div></div><span class="hint">干线航线代码</span></div>
<div class="field"><label>VVD (航次号)</label><div class="dd-wrap"><input type="text" id="vi" placeholder="例: RACE2616W" maxlength="20"><div class="dd-list" id="vd"></div></div><span class="hint">船名简称+航次+航向(E/W)</span></div>
<button class="btn-q" onclick="dq()">🔍 查询</button><button class="btn-c" onclick="cq()">清除</button>
</div>
<div class="quick">
<div class="quick-lbl">最近搜索:</div><div class="chips" id="qh"></div>
</div>
<div class="quick" style="border-top:none;padding-top:8px;margin-top:0;">
<div class="quick-lbl">热门航次:</div><div class="chips" id="qc"></div>
</div>
</div>
</div>

<div class="rsec" id="rs" style="display:none;">
<div class="scard">
<div class="shdr"><h2>查询结果</h2> <span class="vbadge" id="rv">-</span></div>
<div class="stats">
<div class="stat"><div class="lbl">Trunk Lane</div><div class="val" id="stl">-</div></div>
<div class="stat"><div class="lbl">总货量 TEU</div><div class="val" id="st">-</div></div>
<div class="stat"><div class="lbl">总重量 (Ton)</div><div class="val" id="sgw">-</div></div>
</div>
</div>
<div class="tcard">
<div class="thdr"><h3>📋 POL 货量汇总（点击展开 POD）</h3> <button class="btn-exp" onclick="ex()">📥 导出 CSV</button></div>
<div class="twrap">
<table style="table-layout:fixed;" id="mainTbl"><colgroup><col style="width:30px"><col><col><col><col><col><col><col><col></colgroup><thead><tr><th></th><th>POL</th><th>ETD</th><th>20'</th><th>40'</th><th>货量 TEU</th><th>总重 Ton</th><th>均重 T/TEU</th><th id="thLane1">FIRST LANE</th></tr></thead>
<tbody id="rb"></tbody>
</table>
</div>
</div>
<div class="tcard" id="podCard" style="display:none;">
<div class="thdr"><h3>📋 POD 货量汇总（点击展开 POL）</h3></div>
<div class="twrap">
<table style="table-layout:fixed;" id="podTbl"><colgroup><col style="width:30px"><col style="width:40px"><col><col><col><col><col></colgroup><thead><tr><th></th><th>排名</th><th>POD</th><th>货量 TEU</th><th>总重 Ton</th><th>均重 T/TEU</th><th>占比</th></tr></thead>
<tbody id="pb"></tbody>
</table>
</div>
</div>
</div>

<div class="rsec" id="es"><div class="es"><div class="ic">🔍</div><div>请输入 VVD 进行查询</div></div></div>

        return ea<eb?-1:ea>eb?1:0;
    });

    function rg(lbl,items){
        if(!items.length)return'';
        var isDirect=(lbl==='Direct');
        var tc=isDirect?'rgba(34,197,94,.2)':'rgba(168,85,247,.2)';
        var fc=isDirect?'#86efac':'#d8b4fe';
        
        // Calculate totals first
        var gt=0,gw=0,g20=0,g40=0;
        items.forEach(function(p){gt+=p.totalTeu;gw+=p.totalGrossTon;g20+=p.total20ft;g40+=p.total40ft;});
        
        // Subtotal header row FIRST - label in first cell, spans all data columns
        var h='<tr class="gs" style="'+bg(tc,'.08')+';">';
        h+='<td></td><td colspan="2" style="padding:8px 12px;color:'+fc+';font-weight:600;font-size:11.5px;">';
        h+='<span class="tag" style="background:'+tc+';color:'+fc+';">'+lbl+'</span> 小计 ('+items.length+' POL)</td>';
        h+='<td>'+g20+'</td><td>'+g40+'</td>';
        h+='<td><span class="tag tag-cg">'+gt+'</span></td>';
        h+='<td>'+fmt(gw)+'</td><td>'+(gt>0?(gw/gt).toFixed(1):'-')+'</td><td></td></tr>';
        
        // Then data rows - use group color for POL tag
        var polTagClass=isDirect?'tag-pl':'tag-ts';
        items.forEach(function(p){
            var idx=p._i;
            h+='<tr class="pr" id="i'+idx+'" onclick="tp('+idx+')">';
            h+='<td><span class="ei">&#9654;</span></td>';
            h+='<td><span class="tag '+polTagClass+'">'+esc(p.pol)+'</span></td>';
            h+='<td>'+(p.etd||'-')+'</td>';
            h+='<td>'+(p.total20ft||0)+'</td>';
            h+='<td>'+(p.total40ft||0)+'</td>';
            h+='<td><span class="tag tag-cg">'+p.totalTeu+'</span></td>';
            h+='<td>'+fmt(p.totalGrossTon)+'</td>';
            h+='<td>'+(p.totalTeu>0?(p.totalGrossTon/p.totalTeu).toFixed(1):'-')+'</td>';
            h+='<td><span class="tag tag-ln">'+esc(p.firstLane)+'</span></td>';
            h+='</tr>';
            if(p.podList.length){
                var pc=9;
                h+='<tr class="pbd" id="p'+idx+'"><td colspan="'+pc+'" style="padding:0;"><table style="width:100%;margin:0;border-collapse:collapse;table-layout:fixed;">';
                h+='<colgroup><col style="width:30px"><col><col><col><col><col><col><col><col></colgroup>';
                p.podList.forEach(function(pd){
                    var pct=Math.round(pd.teu/Math.max(p.totalTeu,1)*1000)/10;
                    var bw=Math.max(Math.round(pct),3);
                    var avgW=pd.teu>0?(pd.grossTon/pd.teu).toFixed(1):'-';
                    h+='<tr style="background:#0c1322;">';
                    h+='<td></td>';
                    h+='<td></td>';
                    h+='<td style="padding:5px 12px;"><span class="tag tag-pd" style="font-size:10.5px;">'+esc(pd.pod)+'</span></td>';
                    h+='<td style="padding:5px 12px;">'+(pd.ft20||0)+'</td>';
                    h+='<td style="padding:5px 12px;">'+(pd.ft40||0)+'</td>';
                    h+='<td style="padding:5px 12px;">'+pd.teu+'</td>';
                    h+='<td style="padding:5px 12px;">'+fmt(pd.grossTon)+'</td>';
                    h+='<td style="padding:5px 12px;">'+avgW+'</td>';
                    h+='<td style="padding:5px 12px;">';
                    h+='<span style="display:inline-flex;align-items:center;gap:4px;"><span class="pb" style="width:'+bw+'px;height:14px;"><span class="pbfill"></span></span><span class="pbt">'+pct+'%</span></span>';
                    h+='</td></tr>';
                });
                h+='</table></td></tr>';
            }
        });
        return h;
    }

    var tb=document.getElementById('rb');
    tb.innerHTML=rg('Direct',di)+rg('T/S',ts)+
        '<tr class="tr"><td colspan="5" style="text-align:right;padding-right:12px;color:var(--tx4);font-weight:400;">合计</td>'+
        '<td><span class="tag tag-cg">'+d.totalTeu+'</span></td><td>'+fmt(d.totalGrossTon)+'</td><td>'+(d.totalTeu>0?(d.totalGrossTon/d.totalTeu).toFixed(1):'-')+'</td><td></td></tr>';

    // POD summary: build pod -> pol breakdown, sort by TEU desc
    var podMap={};
    d.polSummary.forEach(function(p){
        p.podList.forEach(function(pd){
            if(!podMap[pd.pod]) podMap[pd.pod]={teu:0,grossTon:0,pols:[]};
            podMap[pd.pod].teu+=pd.teu;
            podMap[pd.pod].grossTon+=pd.grossTon;
            podMap[pd.pod].pols.push({pol:p.pol,etd:p.etd,firstLane:p.firstLane,trunkLane:p.trunkLane,teu:pd.teu,ft20:pd.ft20,ft40:pd.ft40,grossTon:pd.grossTon});
        });
    });
    var podList=Object.entries(podMap).map(function(e){return{pod:e[0],teu:e[1].teu,grossTon:e[1].grossTon,pols:e[1].pols};}).sort(function(a,b){return b.teu-a.teu;});
    var ptb=document.getElementById('pb');
    epod.clear();
    var ph='';
    podList.forEach(function(pd,i){
        var pct=(d.totalTeu>0?(pd.teu/d.totalTeu*100):0).toFixed(1);
        var avgW=pd.teu>0?(pd.grossTon/pd.teu).toFixed(1):'-';
        var bw=Math.max(Math.round(parseFloat(pct)),3);
        ph+='<tr class="pr" id="z'+pd.pod+'" onclick="tpod(\''+esc(pd.pod)+'\')">';
        ph+='<td><span class="ei">&#9654;</span></td>';
        ph+='<td style="color:var(--tx5);font-weight:600;">'+(i+1)+'</td>';
        ph+='<td><span class="tag tag-pd">'+esc(pd.pod)+'</span></td>';
        ph+='<td><span class="tag tag-cg">'+pd.teu+'</span></td>';
        ph+='<td>'+fmt(pd.grossTon)+'</td>';
        ph+='<td>'+avgW+'</td>';
        ph+='<td><span style="display:inline-flex;align-items:center;gap:4px;"><span class="pb" style="width:'+bw+'px;height:14px;"><span class="pbfill"></span></span><span class="pbt">'+pct+'%</span></span></td>';
        ph+='</tr>';
        // Expandable POL detail rows for this POD
        if(pd.pols.length>0){
            // Sort pols by TEU desc
            pd.pols.sort(function(a,b){return b.teu-a.teu;});
            var colSpan=7;
            ph+='<tr class="pbd" id="zd'+pd.pod+'"><td colspan="'+colSpan+'" style="padding:0;"><table style="width:100%;margin:0;border-collapse:collapse;table-layout:fixed;">';
            ph+='<colgroup><col style="width:30px"><col style="width:40px"><col><col><col><col><col></colgroup>';
            pd.pols.forEach(function(pp){
                var isD=pp.firstLane===pp.trunkLane;
                var tagCls=isD?'tag-pl':'tag-ts';
                ph+='<tr style="background:#0c1322;">';
                ph+='<td></td><td></td>';
                ph+='<td style="padding:5px 12px;"><span class="tag '+tagCls+'" style="font-size:10.5px;">'+esc(pp.pol)+'</span></td>';
                ph+='<td style="padding:5px 12px;"><span class="tag tag-cg" style="font-size:11px;">'+pp.teu+'</span></td>';
                ph+='<td style="padding:5px 12px;">'+fmt(pp.grossTon)+'</td>';
                ph+='<td style="padding:5px 12px;">'+(pp.teu>0?(pp.grossTon/pp.teu).toFixed(1):'-')+'</td>';
                // Percentage bar for this POL's share of the POD total
                var ppct=Math.round(pp.teu/Math.max(pd.teu,1)*1000)/10;
                var ppbw=Math.max(Math.round(ppct),3);
                ph+='<td style="padding:5px 12px;">';
                ph+='<span style="display:inline-flex;align-items:center;gap:4px;"><span class="pb" style="width:'+ppbw+'px;height:14px;"><span class="pbfill"></span></span><span class="pbt">'+ppct+'%</span></span>';
                ph+='</td></tr>';
            });
            ph+='</table></td></tr>';
        }
    });
    ptb.innerHTML=ph;
}

function bg(op,a){
    return 'background:'+op.replace(')',a)+')';
}

function esc(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Format number with thousand separator, 1 decimal
function fmt(n){
    return Number(n||0).toFixed(1).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}

function cq(){
    document.getElementById('vi').value='';
    document.getElementById('li').value='';
    _hideDD(_ldEl);_hideDD(_vdEl);
    document.getElementById('rs').style.display='none';
    document.getElementById('podCard').style.display='none';
    document.getElementById('es').style.display='block';
    ep.clear();epod.clear();curVVD='';
}

function ex(){
    if(!curVVD)return;
    var d=DB.vvds[curVVD];
    if(!d)return;
    var csv='\uFEFFPOL,FIRST LANE,TRUNK LANE,POD,20ft,40ft(+40RF),TEU,总重(Ton),均重(T/TEU)\n';
    d.polSummary.forEach(function(p){
        p.podList.forEach(function(pd){
            csv+='"'+p.pol+'","'+p.firstLane+'","'+p.trunkLane+'","'+pd.pod+'",'+(pd.ft20||0)+','+(pd.ft40||0)+','+pd.teu+','+pd.grossTon.toFixed(1)+','+(pd.teu>0?(pd.grossTon/pd.teu).toFixed(1):'-')+'\n';
        });
    });
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='VVD_'+curVVD+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

document.getElementById('vi').addEventListener('keydown',function(e){if(e.key==='Enter')dq();});

// Init immediately - no loading overlay needed since data is tiny
init();
</script>
