<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VVD Booking查询 - CULINES</title>
<style>
:root{--bg:#f5f7fa;--bg2:#fff;--bg3:#e8ecf1;--tx:#1a1a2e;--tx2:#4a4a6a;--tx3:#888;--ac:#2563eb;--ac2:#1d4ed8;--bd:#d1d5db;--sb:#fef3c7;--ln:#10b981;--ts:#f59e0b;--ws:#e5e7eb}
[data-theme=dark]{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;--bd:#334155;--sb:#451a03;--ws:#1e293b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);padding:20px;min-height:100vh}
.hdr{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.hdr h1{font-size:1.5rem;color:var(--ac)}
.srch{flex:1;min-width:200px;position:relative}
.srch input{width:100%;padding:10px 16px;border:1px solid var(--bd);border-radius:8px;background:var(--bg2);color:var(--tx);font-size:14px}
.srch input:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.srch .hint{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:12px;pointer-events:none}
.thm{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:6px 12px;cursor:pointer;color:var(--tx2);font-size:14px}
.thm:hover{background:var(--bg3)}
.main{display:grid;grid-template-columns:250px 1fr;gap:16px;min-height:calc(100vh-160px)}
@media(max-width:768px){.main{grid-template-columns:1fr}}
.sd{background:var(--bg2);border-radius:8px;padding:12px;border:1px solid var(--bd)}
.sd h3{font-size:13px;color:var(--tx2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--ws);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;color:var(--tx2);transition:all .2s}
.chip:hover{background:var(--ac);color:#fff}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:16px;text-align:center}
.stat .lb{font-size:12px;color:var(--tx3);text-transform:uppercase;margin-bottom:4px}
.stat .vl{font-size:24px;font-weight:700;color:var(--ac)}
.tb{width:100%;border-collapse:collapse;font-size:13px}
.tb th{background:var(--bg3);padding:10px 12px;text-align:left;font-weight:600;color:var(--tx2);border-bottom:2px solid var(--bd);position:sticky;top:0}
.tb td{padding:10px 12px;border-bottom:1px solid var(--bd);vertical-align:top}
.tb tr:hover{background:var(--ws)}
.tb .pol-row{cursor:pointer;font-weight:500}
.tb .pol-row:hover{background:var(--sb)}
.tb .n{padding-left:24px}
.tb .dim{color:var(--tx3)}
.tb .ln{color:var(--ln);font-weight:500}
.tb .ts{color:var(--ts);font-weight:500}
.tb .bar{height:4px;background:var(--ac);border-radius:2px;transition:width .3s}
.tb .bar.eir{background:var(--ln)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal.hide{display:none}
.modal-c{background:var(--bg2);border-radius:12px;width:100%;max-width:600px;max-height:80vh;overflow:auto}
.modal-c h2{font-size:1.2rem;padding:16px;border-bottom:1px solid var(--bd)}
.modal-c .close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--tx2);padding:0 16px}
.sr{background:var(--ac);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer}
.sr:hover{background:var(--ac2)}
.mtbl{width:100%;font-size:12px}
.mtbl th,.mtbl td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--bd)}
.mtbl th{background:var(--bg3);font-weight:600}
.rec{font-size:11px;color:var(--tx3);text-align:center;padding:16px}
.sub{font-size:11px;color:var(--tx3)}
.sub td{padding:4px 12px}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.tb{font-size:12px}.tb th,.tb td{padding:8px}}
</style>
</head>
<body>
<div class=hdr>
<h1>🚢 VVD Booking 查询</h1>
<div class=srch><input id=si placeholder="输入 VVD 搜索..."><span class=hint>按 Enter 搜索</span></div>
<button class=thm onclick="toggleTheme()">🌓 主题</button>
</div>
<div class=stats id=st></div>
<div class=main>
<div class=sd>
<h3>热门航次</h3>
<div class=chips id=tv></div>
<h3 style="margin-top:16px">最近搜索</h3>
<div class=chips id=rs></div>
<h3 style="margin-top:16px">Lane 快捷</h3>
<div class=chips id=tl></div>
</div>
<div class=sd>
<div style="margin-bottom:12px"><button class=sr onclick="exportCSV()">📥 导出 CSV</button></div>
<table class=tb><thead><tr><th>POL</th><th>ETD</th><th>Lane</th><th>货量(TEU)</th><th>OP</th><th>EIR</th></tr></thead><tbody id=bd></tbody></table>
</div>
</div>
<div class="modal hide" id=md>
<div class=modal-c>
<div style="display:flex;align-items:center;border-bottom:1px solid var(--bd)">
<h2 id=mh>航次详情</h2>
<span style=flex:1></span>
<button class=close onclick="closeModal()">×</button>
</div>
<div style=padding:16px>
<table class=mtbl><thead><tr><th>POD</th><th>Booking TEU</th><th>OP</th><th>EIR</th></tr></thead><tbody id=mb></tbody></table>
</div>
</div>
</div>

function toggleTheme(){document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark';localStorage.setItem('theme',document.documentElement.dataset.theme)}
document.documentElement.dataset.theme=localStorage.getItem('theme')||'light';
var recent=JSON.parse(localStorage.getItem('vvd_recent')||'[]');
function sv(v){document.getElementById('si').value=v;search(v)}
function search(q){
if(!q.trim()){document.getElementById('bd').innerHTML='<tr><td colspan=6 class=rec>请输入 VVD</td></tr>';return}
var lq=q.trim().toUpperCase();
var results=Object.keys(DB.vvds).filter(v=>v.toUpperCase().includes(lq));
if(results.length===0){document.getElementById('bd').innerHTML='<tr><td colspan=6 class=rec>未找到匹配结果</td></tr>';return}
var v=results[0];
showVVD(v);
if(!recent.includes(v)){recent.unshift(v);recent=recent.slice(0,8);localStorage.setItem('vvd_recent',JSON.stringify(recent));renderRecent()}
}
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')search(e.target.value)});
function showVVD(v){
var d=DB.vvds[v],html='';
document.getElementById('st').innerHTML=`<div class=stat><div class=lb>VVD</div><div class=vl>${v}</div></div><div class=stat><div class=lb>Total TEU</div><div class=vl>${Math.round(d.totalTeu)}</div></div><div class=stat><div class=lb>POL数</div><div class=vl>${d.polSummary.length}</div></div>`;
d.polSummary.forEach(p=>{
var pct=Math.round(p.opTeu/p.totalTeu*100),pct2=Math.round(p.eirTeu/p.totalTeu*100);
html+=`<tr class=pol-row onclick="showPods('${p.pol}')"><td>${p.pol}</td><td class=dim>${p.etd}</td><td><span class="tag tag-ln">${esc(p.firstLane)}</span> → ${esc(p.trunkLane)}</td><td><b>${Math.round(p.totalTeu)}</b><div class=bar style="width:${Math.min(pct2,100)}%"></div></td><td><span class=ln>${Math.round(p.opTeu)}</span><div class="bar" style="width:${Math.min(pct,100)}%;opacity:.5"></div></td><td><span class=ts>${Math.round(p.eirTeu)}</span></td></tr>`;
});
document.getElementById('bd').innerHTML=html||'<tr><td colspan=6 class=rec>暂无数据</td></tr>';
}
function showPods(pol){
var v=document.getElementById('si').value;
var d=DB.vvds[v];
var p=d.polSummary.find(x=>x.pol===pol);
if(!p)return;
document.getElementById('mh').textContent=v+' - '+pol;
var html='';
p.podList.forEach(pod=>{
var pct=Math.round(pod.opTeu/pod.teu*100),pct2=Math.round(pod.eirTeu/pod.teu*100);
html+=`<tr><td>${pod.pod}</td><td>${Math.round(pod.teu)}<div class=bar style="width:${Math.min(pct2,100)}%"></div></td><td><span class=ln>${Math.round(pod.opTeu)}</span><div class="bar" style="width:${Math.min(pct,100)}%;opacity:.5"></div></td><td><span class=ts>${Math.round(pod.eirTeu)}</span></td></tr>`;
});
document.getElementById('mb').innerHTML=html;
document.getElementById('md').classList.remove('hide');
}
function closeModal(){document.getElementById('md').classList.add('hide')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
function exportCSV(){
var v=document.getElementById('si').value;
if(!v){alert('请先搜索 VVD');return}
var d=DB.vvds[v],rows=[['POL','ETD','First Lane','Trunk Lane','POD','Booking TEU','OP','EIR']];
d.polSummary.forEach(p=>{
p.podList.forEach(pod=>{rows.push([p.pol,p.etd,p.firstLane,p.trunkLane,pod.pod,Math.round(pod.teu),Math.round(pod.opTeu),Math.round(pod.eirTeu)])});
});
var csv=rows.map(r=>r.join(',')).join('\n');
var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
var link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=v+'.csv';link.click();
}
function esc(s){return s===null||s===undefined?'':String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function renderRecent(){document.getElementById('rs').innerHTML=recent.map(v=>`<span class=chip onclick="sv('${v}')">${v}</span>`).join('')}
function renderTop(){document.getElementById('tv').innerHTML=DB.topVVDs.map(i=>`<span class=chip onclick="sv('${i.vvd}')">${i.vvd} (${Math.round(i.teu)})</span>`).join('')}
renderRecent();renderTop();
</script>
